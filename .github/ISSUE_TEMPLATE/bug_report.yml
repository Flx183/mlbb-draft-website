name: Bug report
description: Report a reproducible defect in the app, data flow, or developer workflow.
title: "[Bug] "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is going wrong?
      placeholder: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: List the steps needed to hit the issue.
      placeholder: |
        1. Go to ...
        2. Click ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened instead?
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - frontend
        - backend
        - tests
        - CI/workflows
        - docs
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Extra context
      description: Include screenshots, logs, payloads, or notes if they help.
